<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>客服後台</title><style>body{margin:0;font-family:Arial,'Microsoft JhengHei',sans-serif;background:#0f0f0f;color:#fff}.app{display:grid;grid-template-columns:320px 1fr 320px;height:100vh}.side,.note{border-right:1px solid #333;background:#151515;overflow:auto}.note{border-right:0;border-left:1px solid #333;padding:14px}.top{padding:14px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}.list .item{padding:12px;border-bottom:1px solid #282828;cursor:pointer}.item:hover,.item.active{background:#242424}.small{color:#aaa;font-size:12px}.chat{display:flex;flex-direction:column;min-width:0}.msgs{flex:1;overflow:auto;padding:18px}.msg{max-width:70%;padding:10px 12px;border-radius:12px;margin:8px 0;line-height:1.4}.visitor{background:#2b2b2b}.agent{background:#f4c542;color:#111;margin-left:auto}.send{display:flex;border-top:1px solid #333}.send input{flex:1;padding:14px;background:#1f1f1f;color:#fff;border:0;outline:0}.send button,button{border:0;background:#f4c542;color:#111;font-weight:bold;padding:12px 14px;cursor:pointer;border-radius:8px}textarea,input,select{width:100%;box-sizing:border-box;margin:8px 0;padding:10px;border-radius:8px;border:1px solid #333;background:#202020;color:#fff}label{font-size:13px;color:#ccc}.empty{color:#888;text-align:center;margin-top:40px}@media(max-width:900px){.app{grid-template-columns:1fr}.side,.note{height:35vh}.note{display:none}}</style></head><body><div class="app"><aside class="side"><div class="top"><b>對話列表</b><button onclick="logout()">登出</button></div><div id="list" class="list"></div></aside><main class="chat"><div class="top"><div><b id="title">請選擇對話</b><div class="small" id="sub"></div></div><button onclick="loadConversations()">刷新</button></div><div id="msgs" class="msgs"><div class="empty">左側選擇一個訪客開始回覆</div></div><div class="send"><input id="text" placeholder="輸入回覆內容..."><button onclick="sendMsg()">送出</button></div></main><aside class="note"><h3>備註 / 狀態</h3><label>訪客名稱</label><input id="visitor_name"><label>聯絡方式</label><input id="visitor_contact"><label>狀態</label><select id="status"><option value="open">open</option><option value="pending">pending</option><option value="closed">closed</option></select><label>指派客服</label><input id="assigned_to" placeholder="例如 kefu1"><label>內部備註</label><textarea id="note" rows="10" placeholder="這裡的備註只給內部看"></textarea><button onclick="saveNote()">儲存備註</button></aside></div><script src="/socket.io/socket.io.js"></script><script>
let current='', conversations=[]; const socket=io();
async function check(){ const r=await fetch('/api/me'); if(!r.ok) location.href='/admin/login.html'; } check();
function fmt(s){return s?new Date(s).toLocaleString():''}
async function loadConversations(){ const r=await fetch('/api/conversations'); conversations=await r.json(); list.innerHTML=conversations.map(c=>`<div class="item ${c.id===current?'active':''}" onclick="openConvo('${c.id}')"><b>${c.visitor_name||c.id.slice(0,8)}</b><div class="small">${c.status} ${c.assigned_to?'｜'+c.assigned_to:''}</div><div class="small">${(c.last_message||'').slice(0,48)}</div><div class="small">${fmt(c.updated_at)}</div></div>`).join(''); }
async function openConvo(id){ current=id; socket.emit('join',id); const r=await fetch('/api/conversations/'+id); const data=await r.json(); const c=data.conversation; title.textContent=c.visitor_name||c.id; sub.textContent='ID: '+c.id+' ｜ '+fmt(c.created_at); visitor_name.value=c.visitor_name||''; visitor_contact.value=c.visitor_contact||''; status.value=c.status||'open'; assigned_to.value=c.assigned_to||''; note.value=c.note||''; renderMsgs(data.messages); loadConversations(); }
function renderMsgs(ms){ msgs.innerHTML=ms.map(m=>`<div class="msg ${m.sender_type==='agent'?'agent':'visitor'}"><div>${escapeHtml(m.body)}</div><div class="small">${m.sender_name||m.sender_type} ｜ ${fmt(m.created_at)}</div></div>`).join(''); msgs.scrollTop=msgs.scrollHeight; }
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
async function sendMsg(){ if(!current||!text.value.trim())return; await fetch('/api/conversations/'+current+'/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({body:text.value.trim()})}); text.value=''; await openConvo(current); }
async function saveNote(){ if(!current)return; await fetch('/api/conversations/'+current,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({visitor_name:visitor_name.value,visitor_contact:visitor_contact.value,status:status.value,assigned_to:assigned_to.value,note:note.value})}); await openConvo(current); }
async function logout(){ await fetch('/api/logout',{method:'POST'}); location.href='/admin/login.html'; }
socket.on('message',m=>{ if(m.conversation_id===current) openConvo(current); loadConversations(); });
socket.on('new_conversation',loadConversations); socket.on('conversation_updated',loadConversations);
text.addEventListener('keydown',e=>{ if(e.key==='Enter') sendMsg(); }); loadConversations();
</script></body></html>
