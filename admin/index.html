<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>客服後台</title>
<style>
:root{--bg:#0d0d0d;--panel:#181818;--line:#2e2e2e;--gold:#f4c542;--muted:#9a9a9a;--red:#ff7474;--green:#7ff0a7}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#fff;font-family:Arial,'Noto Sans TC',sans-serif}.app{display:grid;grid-template-columns:360px 1fr 360px;height:100vh}.side,.chat,.note{border-right:1px solid var(--line);min-height:0}.top{height:58px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:#121212}.tabs{display:flex;gap:6px;padding:10px;border-bottom:1px solid var(--line);background:#111}.tabs button{flex:1;background:#202020;color:#ddd;border:1px solid #333;border-radius:10px;padding:9px;cursor:pointer}.tabs button.active{background:var(--gold);color:#111;font-weight:900}.filters{padding:10px;border-bottom:1px solid var(--line);display:grid;gap:8px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.list{height:calc(100vh - 170px);overflow:auto}.item{padding:12px;border-bottom:1px solid var(--line);cursor:pointer}.item:hover,.item.active{background:#232323}.unread{box-shadow:inset 4px 0 0 var(--gold)}input,textarea,select,button{font:inherit}input,textarea,select{width:100%;background:#222;border:1px solid #333;color:#fff;border-radius:8px;padding:10px}textarea{resize:vertical}button{border:0;border-radius:8px;padding:10px 12px;background:var(--gold);color:#111;font-weight:bold;cursor:pointer}button.secondary{background:#2b2b2b;color:#fff;border:1px solid #444}button.danger{background:#6b1e1e;color:#fff}button.archive{background:#2b3b5d;color:#fff}.chat{display:flex;flex-direction:column}.msgs{flex:1;overflow:auto;padding:16px;background:#101010}.msg{max-width:76%;padding:10px 12px;margin:0 0 12px;border-radius:12px;white-space:pre-wrap;line-height:1.45}.visitor{background:#f4c542;color:#111;margin-left:auto}.agent{background:#292929;color:#fff}.small{display:block;font-size:12px;color:#aaa;margin-top:5px;line-height:1.45}.send{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line);background:#161616}.send input{flex:1}.quick{display:flex;flex-wrap:wrap;gap:6px;max-height:104px;overflow:auto;padding:10px;border-top:1px solid var(--line);background:#101010}.quick button{font-size:12px;background:#2b2b2b;color:#fff;border:1px solid #444}.note{overflow:auto;padding:12px;background:#111}.section{margin-bottom:14px;padding:12px;border:1px solid #333;border-radius:12px;background:#151515}.section h3{margin:0 0 10px}.section h4{margin:12px 0 8px}label{display:block;font-size:13px;color:#ccc;margin:10px 0 5px}.mutedbox{background:#0b0b0b;border:1px solid #292929;border-radius:8px;padding:8px;overflow-wrap:anywhere}.pill{display:inline-block;border-radius:999px;padding:2px 8px;font-size:12px;margin-right:4px}.online{background:#113d25;color:var(--green)}.offline{background:#432222;color:#ff9c9c}.status{background:#2a2a2a;color:#ddd}.empty{color:#888;text-align:center;margin-top:40px}.actions{display:flex;gap:8px;flex-wrap:wrap}.warn{color:#ffcc66;font-size:12px;line-height:1.5}.hidden{display:none!important}@media(max-width:1000px){.app{grid-template-columns:1fr}.side,.note{height:38vh}.note{display:none}.quick{max-height:90px}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="top"><b>對話管理</b><button onclick="logout()">登出</button></div>
    <div class="tabs"><button id="tabActive" class="active" onclick="switchBox('active')">進行中</button><button id="tabArchive" onclick="switchBox('archive')">封存</button><button id="tabTrash" onclick="switchBox('trash')">垃圾桶</button></div>
    <div class="filters">
      <input id="search" placeholder="搜尋姓名 / 來源 / 活動 / 訊息 / 設備" oninput="renderList()">
      <div class="grid2"><select id="statusFilter" onchange="renderList()"><option value="">全部狀態</option><option value="open">待處理</option><option value="pending">等待客戶</option><option value="closed">已結束</option></select><select id="onlineFilter" onchange="renderList()"><option value="">全部在線</option><option value="online">在線</option><option value="offline">離線</option></select></div>
    </div>
    <div id="list" class="list"></div>
  </aside>

  <main class="chat">
    <div class="top"><div><b id="title">請選擇對話</b><div class="small" id="sub"></div></div><div class="actions"><button class="secondary" onclick="loadCurrentBox()">刷新</button><button id="archiveBtn" class="archive hidden" onclick="archiveCurrent()">封存</button><button id="trashBtn" class="danger hidden" onclick="trashCurrent()">刪除</button><button id="restoreBtn" class="secondary hidden" onclick="restoreCurrent()">還原</button><button id="deleteForeverBtn" class="danger hidden" onclick="deleteForever()">永久刪除</button></div></div>
    <div id="msgs" class="msgs"><div class="empty">左側選擇一個訪客開始回覆</div></div>
    <div class="quick" id="quickReplyBar"></div>
    <div class="send" id="sendBar"><input id="text" placeholder="輸入回覆內容..."><button onclick="sendMsg()">送出</button></div>
  </main>

  <aside class="note">
    <div class="section">
      <h3>客服狀態 / 話術 / 顯示名稱</h3>
      <label>目前客服狀態</label><select id="support_status"><option value="online">在線</option><option value="offline">離線</option></select>
      <label>聊天窗口標題</label><input id="widget_title" placeholder="Suporte Online">
      <label>在線招呼語</label><textarea id="online_greeting" rows="3"></textarea>
      <label>離線招呼語</label><textarea id="offline_greeting" rows="3"></textarea>
      <label>SOP 快捷話術（一行一則）</label><textarea id="quick_replies" rows="6" placeholder="您好，請問您的會員帳號是多少？"></textarea>
      <label>客服顯示名稱（一行一組：帳號=客戶看到的名稱）</label><textarea id="agent_display_names" rows="5" placeholder="admin=客服小雅&#10;admin1=F1專員&#10;bbs01=VIP專員"></textarea>
      <div class="warn">客戶前台只會看到顯示名稱；後台仍保留實際登入帳號，方便內部追蹤。</div>
      <button onclick="saveSettings()">儲存客服設定</button>
    </div>

    <div class="section">
      <h3>訪客 / 來源 / 設備</h3>
      <div id="source_info" class="small mutedbox">尚未選擇對話</div>
      <label>訪客名稱</label><input id="visitor_name">
      <label>聯絡方式</label><input id="visitor_contact">
      <label>會員帳號 / ID</label><input id="visitor_account">
      <label>狀態</label><select id="status"><option value="open">待處理</option><option value="pending">等待客戶</option><option value="closed">已結束</option></select>
      <label>指派客服</label><input id="assigned_to" placeholder="例如 admin1 / bbs01">
      <label>內部備註</label><textarea id="note" rows="7" placeholder="這裡的備註只給內部看"></textarea>
      <button id="saveNoteBtn" onclick="saveNote()">儲存備註</button>
    </div>
  </aside>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
let current='', currentBox='active', rows=[], currentMessages=[], settings={quick_replies:[],agent_display_names:{}}; const socket=io();
const statusMap={open:'待處理',pending:'等待客戶',closed:'已結束'};
async function check(){ const r=await fetch('/api/me'); if(!r.ok) location.href='/admin/login.html'; } check();
function fmt(s){return s?new Date(s).toLocaleString('zh-TW',{hour12:false}):''}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function onlineText(c){ return c.visitor_online ? '<span class="pill online">在線</span>' : '<span class="pill offline">離線</span>'; }
function statusText(v){ return statusMap[v] || v || '待處理'; }
function endpoint(){ return currentBox==='active'?'/api/conversations':(currentBox==='archive'?'/api/archives':'/api/trash'); }
function switchBox(box){ currentBox=box; current=''; document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active')); tabActive.classList.toggle('active',box==='active'); tabArchive.classList.toggle('active',box==='archive'); tabTrash.classList.toggle('active',box==='trash'); sendBar.classList.toggle('hidden',box!=='active'); archiveBtn.classList.add('hidden'); trashBtn.classList.add('hidden'); restoreBtn.classList.add('hidden'); deleteForeverBtn.classList.add('hidden'); title.textContent=box==='active'?'請選擇對話':(box==='archive'?'封存資料表':'垃圾桶資料表'); sub.textContent=''; msgs.innerHTML='<div class="empty">左側選擇一個項目查看內容</div>'; source_info.textContent='尚未選擇對話'; loadCurrentBox(); }
async function loadCurrentBox(){ const r=await fetch(endpoint()); rows=await r.json(); renderList(); }
async function loadSettings(){ const r=await fetch('/api/settings'); settings=await r.json(); support_status.value=settings.support_status||'online'; widget_title.value=settings.title||''; online_greeting.value=settings.online_greeting||''; offline_greeting.value=settings.offline_greeting||''; quick_replies.value=(settings.quick_replies||[]).join('\n'); agent_display_names.value=Object.entries(settings.agent_display_names||{}).map(([k,v])=>`${k}=${v}`).join('\n'); renderQuickReplies(); }
function renderQuickReplies(){ quickReplyBar.innerHTML=(settings.quick_replies||[]).map(q=>`<button type="button" onclick="useQuick('${encodeURIComponent(q)}')">${escapeHtml(q.slice(0,42))}</button>`).join('') || '<span class="small">尚未設定 SOP 快捷話術</span>'; }
function useQuick(encoded){ text.value=decodeURIComponent(encoded); text.focus(); }
function parseAgentNames(){ const obj={}; agent_display_names.value.split('\n').map(x=>x.trim()).filter(Boolean).forEach(line=>{ const idx=line.indexOf('='); if(idx>0){ const k=line.slice(0,idx).trim(); const v=line.slice(idx+1).trim(); if(k&&v)obj[k]=v; }}); return obj; }
async function saveSettings(){ const list=quick_replies.value.split('\n').map(x=>x.trim()).filter(Boolean); const r=await fetch('/api/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({support_status:support_status.value,widget_title:widget_title.value,online_greeting:online_greeting.value,offline_greeting:offline_greeting.value,quick_replies:list,agent_display_names:parseAgentNames()})}); if(r.ok){ settings=(await r.json()).settings; renderQuickReplies(); alert('客服設定已儲存'); } }
function renderList(){ const q=(search.value||'').toLowerCase(); const sf=statusFilter.value; const of=onlineFilter.value; const filtered=rows.filter(c=>{ const blob=[c.visitor_name,c.visitor_contact,c.visitor_account,c.source_title,c.source_site,c.source_campaign,c.utm_campaign,c.last_message,c.last_agent,c.last_agent_account,c.assigned_to,c.device_type,c.device_model,c.os_name,c.browser_name,c.network_type,c.network_effective_type,c.user_agent].join(' ').toLowerCase(); if(q && !blob.includes(q)) return false; if(currentBox==='active'){ if(sf && c.status!==sf) return false; if(of==='online' && !c.visitor_online) return false; if(of==='offline' && c.visitor_online) return false; } return true; }); list.innerHTML=filtered.map(c=>`<div class="item ${c.id===current?'active':''} ${currentBox==='active'&&c.last_sender_type==='visitor'?'unread':''}" onclick="openConvo('${c.id}')"><b>${escapeHtml(c.visitor_name||'未留姓名')}</b> ${currentBox==='active'?onlineText(c):''}<div class="small">來源：${escapeHtml(c.source_title||c.source_site||'未標記')}${c.source_campaign?' ｜ '+escapeHtml(c.source_campaign):''}</div><div class="small"><span class="pill status">${statusText(c.status)}</span>${c.assigned_to?' 指派：'+escapeHtml(c.assigned_to):''}${c.last_agent?' ｜ 最後回覆：'+escapeHtml(c.last_agent):''}</div><div class="small">設備：${escapeHtml([c.device_type,c.device_model,c.os_name,c.browser_name].filter(Boolean).join(' / ')||'未知')}</div><div class="small">${escapeHtml((c.last_message||'').slice(0,58))}</div><div class="small">${currentBox==='active'?fmt(c.updated_at):'移動時間：'+fmt(c.moved_at)}</div></div>`).join('') || '<div class="empty">沒有符合的資料</div>'; }
async function openConvo(id){ current=id; if(currentBox==='active') socket.emit('join',id); const url=currentBox==='active'?'/api/conversations/'+id:(currentBox==='archive'?'/api/archives/'+id:'/api/trash/'+id); const r=await fetch(url); const data=await r.json(); const c=data.conversation; currentMessages=data.messages||[]; title.innerHTML=`${escapeHtml(c.visitor_name||'未留姓名')} ${currentBox==='active'?(c.visitor_online?'<span class="pill online">在線</span>':'<span class="pill offline">離線</span>'):''}`; sub.textContent='ID: '+c.id+' ｜ 建立：'+fmt(c.created_at)+' ｜ 最後上線：'+fmt(c.visitor_last_seen || '')+(c.moved_at?' ｜ 移動：'+fmt(c.moved_at)+' by '+(c.moved_by||''):''); source_info.innerHTML = `<div><b>來源資訊</b></div><div>落地頁：${escapeHtml(c.source_title||'')}</div><div>代號：${escapeHtml(c.source_site||'')}</div><div>活動：${escapeHtml(c.source_campaign||c.utm_campaign||'')}</div><div>UTM：${escapeHtml([c.utm_source,c.utm_medium,c.utm_campaign].filter(Boolean).join(' / ')||'')}</div><div>網址：${escapeHtml(c.source_url||'')}</div><div>Referrer：${escapeHtml(c.source_referrer||'')}</div><h4>設備 / 網路</h4><div>裝置：${escapeHtml(c.device_type||'未知')} ${escapeHtml(c.device_model||'')}</div><div>系統 / 瀏覽器：${escapeHtml(c.os_name||'')} / ${escapeHtml(c.browser_name||'')}</div><div>解析度：${escapeHtml(c.screen_size||'')} ｜ 視窗：${escapeHtml(c.viewport_size||'')}</div><div>語言 / 時區：${escapeHtml(c.language||'')} / ${escapeHtml(c.timezone||'')}</div><div>網路：${escapeHtml(c.network_type||'未知')} ${c.network_effective_type?' / '+escapeHtml(c.network_effective_type):''} ${c.network_downlink?' / '+escapeHtml(c.network_downlink)+'Mbps':''}</div><div class="warn">注意：手機型號與 WiFi/手機網路只能依瀏覽器提供資訊判斷；iPhone/Safari 常不提供精準網路類型。</div><div>User Agent：${escapeHtml(c.user_agent||'')}</div><h4>客服紀錄</h4><div>最後顯示名稱：${escapeHtml(c.last_agent||'尚未回覆')}</div><div>最後登入帳號：${escapeHtml(c.last_agent_account||'')}</div>`; visitor_name.value=c.visitor_name||''; visitor_contact.value=c.visitor_contact||''; visitor_account.value=c.visitor_account||''; status.value=c.status||'open'; assigned_to.value=c.assigned_to||''; note.value=c.note||''; const readonly=currentBox!=='active'; [visitor_name,visitor_contact,visitor_account,status,assigned_to,note].forEach(el=>el.disabled=readonly); saveNoteBtn.classList.toggle('hidden',readonly); archiveBtn.classList.toggle('hidden',readonly); trashBtn.classList.toggle('hidden',readonly); restoreBtn.classList.toggle('hidden',currentBox==='active'); deleteForeverBtn.classList.toggle('hidden',currentBox!=='trash'); renderMsgs(data.messages||[]); renderList(); }
function renderMsgs(ms){ msgs.innerHTML=ms.map(m=>`<div class="msg ${m.sender_type==='agent'?'agent':'visitor'}"><div>${escapeHtml(m.body)}</div><div class="small">${m.sender_type==='agent'?'客服':'訪客'}：${escapeHtml(m.sender_name||'')}${m.sender_account?'（帳號：'+escapeHtml(m.sender_account)+'）':''} ｜ ${fmt(m.created_at)}</div></div>`).join('') || '<div class="empty">尚無訊息</div>'; msgs.scrollTop=msgs.scrollHeight; }
async function sendMsg(){ if(!current||!text.value.trim()||currentBox!=='active')return; const body=text.value.trim(); text.value=''; await fetch('/api/conversations/'+current+'/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({body})}); await openConvo(current); await loadCurrentBox(); }
async function saveNote(){ if(!current||currentBox!=='active')return; await fetch('/api/conversations/'+current,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({visitor_name:visitor_name.value,visitor_contact:visitor_contact.value,visitor_account:visitor_account.value,status:status.value,assigned_to:assigned_to.value,note:note.value})}); await openConvo(current); await loadCurrentBox(); }
async function archiveCurrent(){ if(!current||currentBox!=='active')return; if(!confirm('確定要封存這筆對話？'))return; await fetch('/api/conversations/'+current+'/archive',{method:'POST'}); switchBox('active'); }
async function trashCurrent(){ if(!current||currentBox!=='active')return; if(!confirm('確定要刪除到垃圾桶？'))return; await fetch('/api/conversations/'+current+'/trash',{method:'POST'}); switchBox('active'); }
async function restoreCurrent(){ if(!current||currentBox==='active')return; await fetch((currentBox==='archive'?'/api/archives/':'/api/trash/')+current+'/restore',{method:'POST'}); switchBox('active'); }
async function deleteForever(){ if(!current||currentBox!=='trash')return; if(!confirm('永久刪除後無法復原，確定？'))return; await fetch('/api/trash/'+current,{method:'DELETE'}); switchBox('trash'); }
async function logout(){ await fetch('/api/logout',{method:'POST'}); location.href='/admin/login.html'; }
socket.on('message',m=>{ if(currentBox==='active'&&m.conversation_id===current) openConvo(current); loadCurrentBox(); });
socket.on('new_conversation',loadCurrentBox); socket.on('conversation_updated',c=>{ loadCurrentBox(); if(c && c.id===current && currentBox==='active') openConvo(current); }); socket.on('conversation_removed',x=>{ if(x&&x.id===current){ current=''; msgs.innerHTML='<div class="empty">對話已移動</div>'; } loadCurrentBox(); }); socket.on('settings_updated',s=>{ settings=s; renderQuickReplies(); });
text.addEventListener('keydown',e=>{ if(e.key==='Enter') sendMsg(); }); loadSettings(); loadCurrentBox();
</script>
</body>
</html>
