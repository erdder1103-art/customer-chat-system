<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>客服登入</title><style>body{margin:0;font-family:Arial;background:#101010;color:#fff;display:grid;place-items:center;height:100vh}.card{width:360px;max-width:90vw;background:#181818;border:1px solid #d9a72e;border-radius:18px;padding:28px;box-shadow:0 12px 40px #0008}h1{margin:0 0 20px;color:#f4c542}input,button{width:100%;box-sizing:border-box;padding:13px;margin:8px 0;border-radius:10px;border:0}input{background:#252525;color:#fff}button{background:#f4c542;color:#111;font-weight:bold;cursor:pointer}.err{color:#ff7b7b;min-height:22px}</style></head><body><div class="card"><h1>客服後台登入</h1><input id="u" placeholder="帳號" value="admin"><input id="p" placeholder="密碼" type="password" value="123456"><button onclick="login()">登入</button><div class="err" id="err"></div></div><script>async function login(){const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u.value,password:p.value})});if(r.ok) location.href='/admin/'; else err.textContent=(await r.json()).error||'登入失敗';}</script></body></html>
